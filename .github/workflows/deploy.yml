name: Deploy Wedding BE

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22 # Đảm bảo cổng SSH đúng
          script_stop: true # Dừng ngay nếu có lệnh nào trong script bị lỗi
          script: |
            cd /home/wedding-be
            
            echo "--- Đang kéo code mới ---"
            git pull origin main
            
            echo "--- Đang build lại Docker (Port 8081) ---"
            # Thêm --remove-orphans để dọn sạch các container cũ không liên quan
            docker-compose up -d --build --force-recreate --remove-orphans
            
            echo "--- Dọn dẹp rác ---"
            docker image prune -f
            
            echo "--- Kiểm tra trạng thái container ---"
            docker ps | grep wedding-backend
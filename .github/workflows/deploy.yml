name: Deploy Wedding BE

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          script_stop: true 
          script: |
            # 1. Di chuyển vào thư mục dự án
            cd /home/ubuntu/wedding-be
            
            echo "--- 📥 Đang kéo code mới từ GitHub ---"
            git pull origin main
            
            echo "--- 🛑 Dừng và dọn dẹp container cũ (Tránh lỗi No such image) ---"
            # Lệnh down giúp reset hoàn toàn trạng thái container cũ
            docker-compose down --remove-orphans
            
            echo "--- 🏗️ Đang build và khởi động lại Docker ---"
            # Sử dụng --build để ép Docker build lại code Java mới nhất
            docker-compose up -d --build
            
            echo "--- 🧹 Dọn dẹp các Image không tên (Dangling Images) ---"
            docker image prune -f
            
            echo "--- ✅ Trạng thái các container đang chạy ---"
            docker ps --format "table {{.Names}}\t{{.Status}}\t{{.Ports}}"